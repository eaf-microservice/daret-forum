  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #ffffff;
      background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .stretch {
      display: block;
      width: 100%;
      height: 100%;
    }

    .cover {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <script src="flutter.js" defer></script>
</head>

<body>
  <div id="loading"
    style="display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; flex-direction: column;">
    <img src="icons/Icon-192.png" alt="Daret Logo" style="width: 100px; height: 100px; margin-bottom: 20px;">
    <div style="font-size: 24px; margin-bottom: 20px;">Loading Daret Forum...</div>
    <div
      style="width: 50px; height: 50px; border: 4px solid #1f77f0; border-top: 4px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite;">
    </div>
    <style>
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </div>
  <script>
    window.addEventListener('load', function (ev) {
      // Download main.dart.js
      console.log('Flutter loader starting...');
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: null,
        },
        onEntrypointLoaded: function (engineInitializer) {
          console.log('Engine initializing...');
          engineInitializer.initializeEngine().then(function (appRunner) {
            console.log('Running app...');
            document.getElementById('loading').style.display = 'none';
            appRunner.runApp();
          }).catch(function (error) {
            console.error('Failed to initialize engine:', error);
            document.getElementById('loading').innerHTML = '<pre style="color: red;">Error loading Flutter app: ' + error + '</pre>';
          });
        }
      }).catch(function (error) {
        console.error('Failed to load entrypoint:', error);
        document.getElementById('loading').innerHTML = '<pre style="color: red;">Error loading Flutter: ' + error + '</pre>';
      });
    });

    window.addEventListener('error', function (event) {
      console.error('Global error:', event);
      document.getElementById('loading').innerHTML += '<pre style="color: red;">Global error: ' + event.error?.message + '\n' + event.error?.stack + '</pre>';
    });
    window.addEventListener('unhandledrejection', function (event) {
      console.error('Unhandled rejection:', event.reason);
      document.getElementById('loading').innerHTML += '<pre style="color: orange;">Unhandled rejection: ' + event.reason + '</pre>';
    });
  </script>

</body>

</html>
